name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Create portable ZIP
        shell: pwsh
        run: Compress-Archive -Path "publish/*" -DestinationPath "Skjermbilde-Windows-x64.zip"

      - name: Build NSIS installer
        uses: joncloud/makensis-action@v4
        with:
          script-file: installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Skjermbilde-Windows-x64
          path: |
            publish/Skjermbilde.exe
            Skjermbilde-Setup.exe
            Skjermbilde-Windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/Skjermbilde.exe
            Skjermbilde-Setup.exe
            Skjermbilde-Windows-x64.zip
          generate_release_notes: true
